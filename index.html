<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./public/img/logo.svg" type="image/x-icon">
    <link rel="stylesheet" href="./public/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <title>Blabry | Home</title>
</head>

<body>
    <header>
        <img src="./public/img/logo_text.svg" alt="imagem-logotipo" class="logo">
        <!-- Search container | desktop -->
        <div class="search-container">
            <div class="search-icon">
                <span class="material-symbols-outlined">
                    search
                </span>
            </div>
            <input type="text" class="search" id="search" placeholder="Buscar conversas, usuários...">
        </div>
        <div class="icons">
            <!-- Search | mobile -->
            <div class="search-mobile-button">
                <div class="search-icon" id="mobile-search">
                    <span class="material-symbols-outlined">
                        search
                    </span>
                </div>
            </div>

            <div class="notifications">
                <!-- red notification dot -->
                <div class="alert-circle hidden"></div>
                <!-- bell icon -->
                <span class="material-symbols-outlined bell">
                    notifications
                </span>
            </div>

        </div>
        <div class="profile-info"></div>
    </header>
</body>

</html>
